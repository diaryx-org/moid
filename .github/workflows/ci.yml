name: CI
# Format, lint, and test the workspace on every push and PR. Three feature
# configurations get exercised because the core (`moid`) is meant to build
# with no dependencies at all: default (no `os`/`js`), no-default-features
# explicitly, and all-features (adds `getrandom`).
on:
  push: { branches: [master] }
  pull_request: null

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: rustfmt }
    - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: clippy }
    - uses: Swatinem/rust-cache@v2
    - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: cargo test --workspace (default features)
      run: cargo test --workspace
    - name: cargo test -p moid --no-default-features (dependency-free core)
      run: cargo test -p moid --no-default-features
    - name: cargo test --workspace --all-features
      run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@master
      with: { toolchain: "1.70" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo check --workspace --all-features
