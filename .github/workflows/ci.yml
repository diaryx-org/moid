name: CI
# Format, lint, and test the workspace on every push and PR. Three feature
# configurations get exercised because the core (`moid`) is meant to build
# with no dependencies at all: default (no `os`/`js`), no-default-features
# explicitly, and all-features (adds `getrandom`).
on:
  push: { branches: [master] }
  pull_request: null

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: rustfmt }
    - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: clippy }
    - uses: Swatinem/rust-cache@v2
    - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: cargo test --workspace (default features)
      run: cargo test --workspace
    - name: cargo test -p moid --no-default-features (dependency-free core)
      run: cargo test -p moid --no-default-features
    - name: cargo test --workspace --all-features
      run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    # Only the `moid` library is held to rust-version = "1.70" — it's the
    # crate actually published to crates.io (see its README: dependency-free
    # core meant to link into WASM/Extism guests on old toolchains). moid-cli
    # is unpublished tooling whose `clap` dependency already needs Cargo 1.85+
    # to even parse its lockfile-resolved `clap_lex`'s manifest (edition
    # 2024) — a number that will keep drifting upward on its own as clap ages,
    # independent of anything in this repo. Chasing that here would make the
    # "MSRV" number meaningless busywork instead of a real compatibility
    # promise, so moid-cli is intentionally left out of this job.
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@master
      with: { toolchain: "1.70" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo check -p moid
    - run: cargo check -p moid --no-default-features
    - run: cargo check -p moid --features js
